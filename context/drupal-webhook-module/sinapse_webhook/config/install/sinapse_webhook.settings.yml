# Skill Radar API configuration
# Override these in settings.php or via Drupal config:
#   $config['sinapse_webhook.settings']['api_url'] = 'https://dev.radar.sinapse.nc';
#   $config['sinapse_webhook.settings']['webhook_secret'] = 'your-secret-here';
api_url: 'https://dev.radar.sinapse.nc'
webhook_secret: ''

# Mapping: Drupal taxonomy term IDs (thematique_d_emploi) -> Skill Radar poste IDs
#
# IMPORTANT: The current thematique_d_emploi terms are from a PREVIOUS campaign:
#   tid=13 "Architecte technique", tid=15 "Chef de projet MOE",
#   tid=16 "Ingenieur Data", tid=17 "Resp. automatisation tests",
#   tid=23 "Developer Full-Stack & DevOps", tid=24 "Business Analyste",
#   tid=26 "Candidature libre"
#
# You MUST create 7 NEW taxonomy terms for the April 2026 campaign:
#   - Tech Lead Adelia (RPG)
#   - Dev Senior Adelia (RPG)
#   - Tech Lead Java / JBoss
#   - Dev Java Senior Full Stack
#   - Dev JBoss Senior
#   - Architecte SI Logiciel
#   - Business Analyst
#
# Then update the term IDs below (replace XX with the actual Drupal tids):
poste_mapping:
  # term_id: skill_radar_poste_id
  'XX': 'poste-1-tech-lead-adelia'
  'XX': 'poste-2-dev-senior-adelia'
  'XX': 'poste-3-tech-lead-java'
  'XX': 'poste-4-dev-java-fullstack'
  'XX': 'poste-5-dev-jboss-senior'
  'XX': 'poste-6-architecte-si'
  'XX': 'poste-7-business-analyst'
  '26': 'candidature-libre'
  # Also add the new term ID for "Candidature libre" when created:
  # 'NEW_TID': 'candidature-libre'
