apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: public-webapp

resources:
- namespace.yaml
- service-account.yaml
- pvc.yaml
- configmap.yaml
- deployment.yaml
- service.yaml
- gateway.yaml
- cronjob-daily-recap.yaml  # v5.2 daily recap email at 08:00 NC
# secret is managed by Infisical operator (InfisicalSecret CRD)

images:
- name: skill-radar
  newName: asia-northeast1-docker.pkg.dev/premier-socle-sinapse/cloud-sinapse/skill-radar
  newTag: latest
