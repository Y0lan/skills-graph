# v5.2 — Daily-recap cron.
#
# Hits POST /api/recruitment/jobs/daily-recap on the in-cluster Service
# at 21:00 UTC (08:00 Pacific/Noumea) once per day. The handler reads
# pending reminders + upcoming stage events and emails Guillaume's
# team a digest. See server/lib/daily-recap.ts.
#
# Auth: Bearer ${INTERNAL_CRON_TOKEN}. The token is read from the same
# secret the deployment uses, so rotating it on the deployment also
# rotates here. Keep the value out of git — managed by the Infisical
# operator alongside RESEND_API_KEY.
#
# Schedule timezone: cron's CronJob.spec.timeZone is GA in k8s 1.27+.
# Both prod (public-webapp ns) and dev (skill-radar-dev ns) run on
# managed GKE 1.27+, so the explicit Pacific/Noumea is honored.
#
# Idempotent: re-running on the same day re-sends the digest. The
# CronJob policy `concurrencyPolicy: Forbid` prevents overlapping runs
# if a previous run hasn't finished yet (rare; the job typically
# finishes in <2s).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: skill-radar-daily-recap
  labels:
    app: skill-radar
    component: cron
spec:
  schedule: "0 8 * * *"
  timeZone: "Pacific/Noumea"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app: skill-radar
            component: cron
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: curlimages/curl:8.10.1
              env:
                - name: INTERNAL_CRON_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: skill-radar-secrets
                      key: INTERNAL_CRON_TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  curl --fail --silent --show-error --max-time 90 \
                    -X POST http://skill-radar:8080/api/recruitment/jobs/daily-recap \
                    -H "Authorization: Bearer ${INTERNAL_CRON_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{}' \
                  || (echo "[daily-recap] cron POST failed" && exit 1)
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
