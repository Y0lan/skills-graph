apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: skill-radar-gateway
  namespace: skill-radar
  annotations:
    networking.gke.io/certmap: skill-radar-map
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skill-radar-route
  namespace: skill-radar
spec:
  parentRefs:
    - name: skill-radar-gateway
      sectionName: http
    - name: skill-radar-gateway
      sectionName: https
  hostnames: ["radar.sinapse.nc"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: skill-radar
          port: 80
