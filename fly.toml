app = "radar-competences"
primary_region = "syd"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true

[mounts]
  source = "sqlite_data"
  destination = "/data"

[[checks]]
  port = 8080
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
