apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skill-radar-dev

resources:
- namespace.yaml
- service-account.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- gateway.yaml
- configmap.yaml
# v5.2 cronjob-daily-recap.yaml NOT mounted in dev: a misfire from the
# dev cluster would email real production recruiters (Resend doesn't
# distinguish dev vs prod senders). Test the endpoint manually on dev
# via:
#   curl -X POST -H "Authorization: Bearer $TOKEN" \
#     https://dev.radar.sinapse.nc/api/recruitment/jobs/daily-recap
# secret is managed by Infisical operator (InfisicalSecret CRD)

images:
- name: skill-radar
  newName: australia-southeast1-docker.pkg.dev/sinapse-core/skill-radar/app
  # CI overrides tag via: kustomize edit set image skill-radar=...app:dev-SHA
  newTag: dev-latest
