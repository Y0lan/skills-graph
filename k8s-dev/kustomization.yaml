apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: apps

resources:
- namespace.yaml
- service-account.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- gateway.yaml
- configmap.yaml
# secret.yaml is managed manually via kubectl (gitignored for security)

images:
- name: skill-radar
  newName: asia-northeast1-docker.pkg.dev/premier-socle-sinapse/cloud-sinapse/skill-radar
  newTag: dev-latest

patches:
- patch: |
    - op: replace
      path: /metadata/labels/app
      value: skill-radar-dev
    - op: replace
      path: /spec/selector/matchLabels/app
      value: skill-radar-dev
    - op: replace
      path: /spec/template/metadata/labels/app
      value: skill-radar-dev
  target:
    kind: Deployment
    name: skill-radar
- patch: |
    - op: replace
      path: /spec/selector/app
      value: skill-radar-dev
  target:
    kind: Service
    name: skill-radar
