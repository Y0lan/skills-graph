apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skill-radar-dev

resources:
- namespace.yaml
- ../k8s/service-account.yaml
- ../k8s/pvc.yaml
- ../k8s/deployment.yaml
- ../k8s/service.yaml
- gateway.yaml
- configmap.yaml
- secret.yaml

images:
- name: skill-radar
  newName: australia-southeast1-docker.pkg.dev/sinapse-core/skill-radar/app
  newTag: dev-initial

patches:
- target:
    kind: Deployment
    name: skill-radar
  patch: |
    - op: replace
      path: /metadata/labels/app
      value: skill-radar-dev
    - op: replace
      path: /spec/selector/matchLabels/app
      value: skill-radar-dev
    - op: replace
      path: /spec/template/metadata/labels/app
      value: skill-radar-dev
- target:
    kind: Service
    name: skill-radar
  patch: |
    - op: replace
      path: /spec/selector/app
      value: skill-radar-dev
