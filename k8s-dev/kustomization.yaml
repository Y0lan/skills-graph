apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: skill-radar-dev

resources:
- namespace.yaml
- service-account.yaml
- pvc.yaml
- deployment.yaml
- service.yaml
- gateway.yaml
- configmap.yaml
# secret.yaml is managed manually via kubectl (gitignored for security)

images:
- name: skill-radar
  newName: australia-southeast1-docker.pkg.dev/sinapse-core/skill-radar/app
  newTag: dev-latest
