apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-radar
  namespace: skill-radar-dev
  labels:
    app: skill-radar
spec:
  replicas: 1  # SQLite is single-writer — do not scale beyond 1
  strategy:
    type: Recreate  # Ensures old pod releases the PVC before new pod starts
  selector:
    matchLabels:
      app: skill-radar
  template:
    metadata:
      labels:
        app: skill-radar
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: skill-radar
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: skill-radar
          image: skill-radar:latest  # Overridden by kustomize or CI
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: skill-radar-config
            - secretRef:
                name: skill-radar-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
        - name: clamav
          image: clamav/clamav:1.5
          ports:
            - containerPort: 3310
              name: clamav
          resources:
            requests:
              memory: 128Mi
            limits:
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 3310
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: 3310
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: skill-radar-data
