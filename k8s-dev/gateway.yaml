apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skill-radar-dev-route
  namespace: public-webapp-dev
spec:
  parentRefs:
    - name: cloud-sinapse-gateway
      namespace: gateway
      sectionName: https
  hostnames: ["dev.radar.sinapse.nc"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: skill-radar-dev
          port: 80
