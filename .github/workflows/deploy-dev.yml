name: Deploy to GKE (Dev)

on:
  push:
    branches: [dev]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test

  deploy-dev:
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      # Auth via sinapse-core (has WI pool + SA)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-deploy@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      # Push to sinapse-core registry (where SA has write access)
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker australia-southeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/skill-radar/app:dev-${{ github.sha }}
            australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/skill-radar/app:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to sinapse-core GKE (same cluster as prod, different namespace)
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials skill-radar \
            --region australia-southeast1 \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy to GKE (dev)
        run: |
          cd k8s-dev
          kustomize edit set image skill-radar=australia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/skill-radar/app:dev-${{ github.sha }}
          kubectl apply -k .
          kubectl -n skill-radar-dev rollout status deployment/skill-radar --timeout=120s

      - name: Smoke test
        run: |
          # Wait for rollout to complete (pod ready)
          kubectl -n skill-radar-dev rollout status deployment/skill-radar --timeout=90s

          # Test via port-forward (bypasses LB propagation delay)
          kubectl -n skill-radar-dev port-forward deploy/skill-radar 9090:8080 &
          PF_PID=$!
          sleep 3
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:9090/health")
          kill $PF_PID 2>/dev/null || true
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (via port-forward)"
          else
            echo "Health check failed: HTTP $STATUS" && exit 1
          fi
