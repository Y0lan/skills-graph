name: Build Dev Image

on:
  push:
    branches: [dev]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/625956894258/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: image-builder@premier-socle-sinapse.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            asia-northeast1-docker.pkg.dev/premier-socle-sinapse/cloud-sinapse/skill-radar:dev-${{ github.sha }}
            asia-northeast1-docker.pkg.dev/premier-socle-sinapse/cloud-sinapse/skill-radar:dev-latest
          # Registry-backed cache survives the 7-day GHA cache expiry and has
          # no 10 GB size cap — layers for the builder stage (node_modules,
          # apt, vite build) persist across CI runs and branches. GHA cache
          # kept as a warm-start fallback for first runs without the registry.
          cache-from: |
            type=registry,ref=asia-northeast1-docker.pkg.dev/premier-socle-sinapse/cloud-sinapse/skill-radar:buildcache
            type=gha
          cache-to: |
            type=registry,ref=asia-northeast1-docker.pkg.dev/premier-socle-sinapse/cloud-sinapse/skill-radar:buildcache,mode=max
            type=gha,mode=max
