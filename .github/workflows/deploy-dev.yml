name: Deploy to GKE (Dev)

on:
  push:
    branches: [dev]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-deploy@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-sinapse/skill-radar:dev-${{ github.sha }}
            asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-sinapse/skill-radar:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-deploy@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials cloud-sinapse \
            --region asia-northeast1 \
            --project ${{ vars.GCP_PROJECT_ID }}

      - name: Deploy to GKE (dev)
        run: |
          cd k8s-dev
          kustomize edit set image skill-radar=asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-sinapse/skill-radar:dev-${{ github.sha }}
          kubectl apply -k .
          kubectl -n public-webapp rollout status deployment/skill-radar-dev --timeout=120s

      - name: Smoke test
        run: |
          kubectl -n public-webapp port-forward deploy/skill-radar-dev 9090:8080 &
          PF_PID=$!
          sleep 2
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:9090/health")
          kill $PF_PID 2>/dev/null || true
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (via port-forward)"
          else
            echo "Health check failed: HTTP $STATUS" && exit 1
          fi
