name: Deploy to Cloud Run (Prod)

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: skill-radar-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-sinapse/skill-radar:${{ github.sha }}
            asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-sinapse/skill-radar:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update skill-radar \
            --image="asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-sinapse/skill-radar@${{ steps.build.outputs.digest }}" \
            --region=asia-northeast1 \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --quiet
          gcloud run services describe skill-radar \
            --region=asia-northeast1 \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --format='value(status.latestReadyRevisionName)'

      - name: Smoke test
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -fsS -o /tmp/skill-radar-health.json -w '%{http_code}' https://dev.radar.sinapse.nc/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              cat /tmp/skill-radar-health.json
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Cloud Run smoke test failed" && exit 1
